# # deployement

# apiVersion: apps/v1
# kind: Deployment
# metadata:
#   name: rabbitmq
#   namespace: roboshop
#   labels:
#     project: roboshop
#     tier: db
#     component: rabbitmq
# spec:
#   replicas: 1
#   selector:
#     matchLabels:
#       project: roboshop
#       tier: db
#       component: rabbitmq
#   # pod
#   template:
#     metadata:
#       labels:
#         project: roboshop
#         tier: db
#         component: rabbitmq
#     spec:
#       containers:
#         - name: rabbitmq
#           image: rabbitmq:3

apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq
  namespace: roboshop
type: Opaque
data:
  RABBITMQ_DEFAULT_USER: cm9ib3Nob3A=
  RABBITMQ_DEFAULT_PASS: cm9ib3Nob3AxMjM=

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: rabbitmq
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: rabbitmq
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3
          envFrom:
            - secretRef:
                name: rabbitmq

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: rabbitmq
spec:
  selector:
    project: roboshop
    tier: db
    component: rabbitmq
  ports:
    - protocol: TCP
      port: 5672
      targetPort: 5672
