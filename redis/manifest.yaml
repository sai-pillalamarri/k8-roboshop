# Service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  selector:
    project: roboshop
    tier: db
    component: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
# Deployement

apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  # pod
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7
